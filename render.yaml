services:
  # Next.js Web App
  - type: web
    name: islomiy-hisobchi-web
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter engine build && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NODE_VERSION
        value: 20

  # Python Bot (Combined with health check to stay alive)
  - type: web
    name: islomiy-hisobchi-py-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        value: "8509459353:AAF59X3xxYvSclQJpXbTSKfuqSiZMlLDPhE"
      - key: WEBAPP_URL
        fromService:
          type: web
          name: islomiy-hisobchi-web
          property: host
