services:
  # Next.js Web App
  - type: web
    name: islomiy-hisobchi-web
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter engine build && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NODE_VERSION
        value: 20

  # Telegram Bot (Endi bu ham Veb xizmat sifatida)
  - type: web
    name: islomiy-hisobchi-bot
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter engine build
    startCommand: pnpm --filter bot start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        fromService:
          type: web
          name: islomiy-hisobchi-web
          property: host
